<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AiProces">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#162A39"/>
      <stop offset="1" stop-color="#0B5A5A"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#1FBFBF"/>
      <stop offset="1" stop-color="#67ECEC"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5BE8E8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5BE8E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeC" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#6BF0F0"/>
      <stop offset="1" stop-color="#0FA8A8"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="256" height="256" rx="60" fill="url(#tile)"/>
  <rect x="0.5" y="0.5" width="255" height="255" rx="59.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/>

  <!-- glow behind optimized node -->
  <circle cx="206" cy="70" r="40" fill="url(#glow)"/>

  <!-- diverging input strands (the messy "before") converging into node A -->
  <g stroke="#79E6E6" stroke-opacity="0.32" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M40 116 C60 128 70 152 86 170"/>
    <path d="M40 150 C58 158 70 162 86 170"/>
    <path d="M40 184 C58 180 72 176 86 170"/>
  </g>

  <!-- main optimized flow: ascends from A through B to the AI node C -->
  <path d="M86 170 C112 150 122 148 146 126 C168 106 184 92 206 70"
        stroke="url(#flow)" stroke-width="11" stroke-linecap="round" fill="none"/>

  <!-- node A: input -->
  <circle cx="86" cy="170" r="8" fill="#162A39" stroke="#C6F2F2" stroke-width="4"/>
  <!-- node B: step -->
  <circle cx="146" cy="126" r="8" fill="#C6F2F2"/>
  <!-- node C: optimized / intelligence endpoint -->
  <circle cx="206" cy="70" r="16" fill="url(#nodeC)"/>
  <circle cx="206" cy="70" r="5" fill="#EAFFFF" fill-opacity="0.95"/>

  <!-- AI spark -->
  <path d="M226 48 l2.6 6.4 6.4 2.6 -6.4 2.6 -2.6 6.4 -2.6 -6.4 -6.4 -2.6 6.4 -2.6 z" fill="#EAFFFF"/>
</svg>
